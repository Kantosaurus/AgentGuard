# =========================
# AgentGuard Inference Config
# =========================

experiment:
  name: "agentguard_inference"
  seed: 42

# -------------------------
# Data
# -------------------------
data:
  processed_dir: "data/processed"
  train_agents:
    - agent-1
    - agent-6
    - agent-9
    - agent-14
    - agent-16
    - agent-2
    - agent-7
    - agent-10
    - agent-15
    - agent-17
    - agent-5
    - agent-13
    - agent-20
  # 👇 specify the agents you want to test on
  test_agents:
    - agent-4
    - agent-12
    - agent-19
    - agent-3
    - agent-8
    - agent-11
    - agent-18

inference:
  checkpoint_path: "data/processed/checkpoints/best_model_fold3.pt"
  batch_size: 32