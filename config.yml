data:
  raw_data_dir: "data/dataset/agentguard-all-batches"
  processed_dir: "data/processed"
  date: "2026-03-15"
  window_size: 30
  seq_context: 8
  max_seq_len: 64
  # Attacked agents (agents 1-15, exposed to attack workloads)
  attacked_agents:
    - agent-1
    - agent-2
    - agent-3
    - agent-4
    - agent-5
    - agent-6
    - agent-7
    - agent-8
    - agent-9
    - agent-10
    - agent-11
    - agent-12
    - agent-13
    - agent-14
    - agent-15
  # Control agents (agents 16-20, normal workload only)
  control_agents:
    - agent-16
    - agent-17
    - agent-18
    - agent-19
    - agent-20
  augmentation: "none"
  augmentation_prob: 0.0
  class_weight_ratio: 3.7057417692693866
  k_folds: 5
  # Fixed split (used by train/eval modes as a single-run alternative to cv)
  train_agents:
    - agent-1
    - agent-2
    - agent-3
    - agent-4
    - agent-5
    - agent-6
    - agent-7
    - agent-8
    - agent-9
    - agent-10
    - agent-16
    - agent-17
    - agent-18
  val_agents:
    - agent-11
    - agent-12
    - agent-19
  test_agents:
    - agent-13
    - agent-14
    - agent-15
    - agent-20

model:
  d_model: 64
  stream1_input_dim: 32
  stream2_input_dim: 28
  mamba_layers: 1
  transformer_layers: 3
  transformer_heads: 8
  transformer_ff_dim: 1024
  latent_dim: 64
  dropout: 0.05
  fusion_strategy: "gated"
  cls_head_layers: 2
  cls_head_hidden_dim: 256
  cls_head_activation: "silu"
  decoder_activation: "silu"

training:
  batch_size: 16
  epochs: 100
  lr: 0.0005269507319882671
  max_grad_norm: 1.0
  lambda_recon: 1.81698223529472
  lambda_contrastive: 1.3064087666290949
  lambda_temporal: 0.19548651680073745
  early_stopping_patience: 10
  optimizer: "adamw"
  weight_decay: 8.530804643772428e-05
  scheduler: "cosine"

logging:
  enabled: true
  log_dir: "logs"
  save_epoch_csv: true
